  {id:680,category:"Pricing Strategy",title:"Annual vs Monthly Plan Discount Optimizer",contract:"Input: current monthly subscriber count and churn rates. Output: recommended annual discount % to maximize LTV.",matrix:["Compute monthly LTV: ARPU / churn","Compute annual LTV with discount d","Find d where annual LTV > monthly LTV"],content:"You are a Discount Optimizer. Given monthly churn rate and average revenue per user (ARPU), find the ideal annual discount to increase LTV.\n\nARPU monthly: $[M]\nMonthly churn: [C]% (e.g., 5% => 0.05)\nMonthly LTV = M / C.\n\nAssume annual plan: upfront 12*M*(1 - d), and churn for annual is typically lower (C_annual = C/2).\nAnnual LTV = (12*M*(1-d)) / (C_annual).\nSet Annual LTV > Monthly LTV, solve for d.\n\nExample: M=50, C=0.05 => monthly LTV=1000. With C_annual=0.025, need 12*50*(1-d)/0.025 > 1000 => 600*(1-d) > 1000 => 1-d > 1.666 impossible. So maybe annual discount shouldn't be offered. Otherwise adjust churn reduction.\nOutput: Recommended discount (0-40%) and projected LTV increase. Return a completion matrix."},
  {id:681,category:"Churn Reduction",title:"Downgrade Flow Exit Survey Analyzer",contract:"Input: user's selected downgrade reason and feedback text. Output: aggregate report and suggested fixes.",matrix:["Count reasons by category","Flag most common reason","Create action plan for top issue"],content:"You are a Downgrade Reason Analyzer. Collect data from users who downgrade their plan, then produce insights.\n\nData: each row has category (price, features, support, not using), free text.\n\nProcess:\n1. Aggregate counts per category. Calculate percentage.\n2. For the top category, extract free text keywords (e.g., 'expensive' -> 'price sensitivity').\n3. If price is top, propose A/B test of lower-tier plan or 15% discount retention offer.\n4. If features, identify missing feature mentioned most often; add to roadmap.\n5. Output a weekly report with trend (increase/decrease of downgrades) and recommendations. Return a completion matrix."},
  {id:682,category:"Onboarding Automation",title:"Activation Email Based on Inactivity",contract:"Input: user signed up but no key action in 48h. Output: personalized reminder email with setup video link.",matrix:["Check if user has completed step 1","Send email with step-by-step guide","Include calendar link for chat"],content:"You are an Activation Reminder. For users who registered but haven't completed the first core action (e.g., 'Create first report') within 48 hours, send an email.\n\nUser: [EMAIL]\nUnfinished step: [STEP_DESCRIPTION]\n\nEmail:\nSubject: '[Name], get started in 2 minutes'.\nBody: 'You're almost there. Watch this 1-minute video to set up your first report.' (link to Loom).\n'Still stuck? Reply to this email – I'll help you personally.' (founder touch).\nAdd a checklist: remaining steps.\nIf still inactive after 7 days, send second email with a 15% discount for first month.\nOutput: Email templates. Return a completion matrix."},
  {id:683,category:"Email Marketing",title:"List Hygiene and Bounce Handler",contract:"Input: email send log with bounces. Output: suppression list update and re-engagement flow for soft bounces.",matrix:["Categorize bounce: hard (invalid) vs soft (full)","Remove hard bounces from active list","For soft bounces, retry 2 times then suppress"],content:"You are a List Hygiene Automator. After an email campaign, process bounces to maintain sender reputation.\n\nBounce logs: email, bounce_type (hard/soft), bounce_reason.\n\nRules:\n- Hard bounces (invalid domain, no mailbox): immediately unsubscribe, add to suppression list, and remove from all future sends.\n- Soft bounces (mailbox full, temporary): keep in list but reduce sending frequency. Retry up to 2 more times over 2 weeks. If still bouncing, suppress.\n- Also flag emails that have bounced in 3 separate campaigns in last 6 months.\n- Output: list of emails to unsubscribe, and a report of top bounce domains.\nReturn a completion matrix."},
  {id:684,category:"Payment Processing",title:"Stripe Connect Onboarding Status Tracker",contract:"Input: Connect user ID. Output: current onboarding status and missing fields required.",matrix:["Fetch account object from Stripe","Parse requirements.currently_due","Send reminder email for missing info"],content:"You are a Stripe Connect Onboarding Tracker. For your platform's connected accounts, monitor onboarding completeness.\n\nUser ID: [STRIPE_USER_ID]\n\nProcess:\n1. Call Stripe API: `accounts.retrieve(user_id)`.\n2. Examine `charges_enabled` and `payouts_enabled`. If false, check `requirements.currently_due` array.\n3. Generate a human-readable list of missing fields (e.g., 'business tax ID', 'bank account').\n4. If missing fields exist and user hasn't updated in 7 days, send a reminder email with a link to the onboarding flow.\n5. Output: Status (not_started, pending, complete), missing fields, next steps. Return a completion matrix."},
  {id:685,category:"User Analytics",title:"Daily User Engagement Score Report",contract:"Input: user events (login, click, share). Output: engagement score per user and distribution histogram.",matrix:["Assign weights to events: login=1, click=2, share=5","Sum per user over 24h","Bucket into high/med/low"],content:"You are an Engagement Score Reporter. Each day, compute an engagement score for every active user based on event weights.\n\nWeights: 'login' =1, 'create_project'=3, 'invite_team'=4, 'payment'=10.\n\nSteps:\n1. Sum weighted events per user for the day.\n2. Determine thresholds: high > 5, medium 2-5, low <2.\n3. Also compute average score across all active users.\n4. Flag users who were active yesterday but scored 0 today as 'dropped engagement'.\n5. Output report: total active users, average score, distribution counts (high/med/low), and list of dropped users for re-engagement email.\nReturn a completion matrix."},
  {id:686,category:"Agent Engineering",title:"Automated Customer Success Call Summarizer",contract:"Input: call recording transcript. Output: summary, action items, and customer sentiment.",matrix:["Extract key topics using keyword frequency","List follow-up tasks (owner, deadline)","Classify sentiment as positive/negative/neutral"],content:"You are a Call Summarizer Agent. Given a plain text transcript of a customer success call (or sales call), produce a concise summary.\n\nTranscript: [TEXT]\n\nProcess:\n1. Identify speaker roles (customer, rep).\n2. Summarize main pain points or requests in 3 bullet points.\n3. Extract action items: each with 'Action: X, Owner: [rep or engineering], Due: [implicit]'.\n4. Sentiment analysis: positive if customer uses words like 'happy', 'love', 'solved'; negative if 'frustrated', 'bug', 'slow'.\n5. Output format:\n   - Summary: 2-3 sentences.\n   - Sentiment: +/-/neutral.\n   - Action items: list.\nReturn a completion matrix."},
  {id:687,category:"SaaS Ops",title:"Expired API Key Rotator",contract:"Input: user API key last used date. Output: email reminder to rotate key, then auto-revoke after 90 days.",matrix:["Check last_used timestamp","If > 60 days, send warning","If > 90 days, revoke key via DB update"],content:"You are an API Key Rotator. For security, automatically expire old API keys that haven't been used recently.\n\nUser API keys: each has key_id, user_id, created_at, last_used_at, active.\n\nPolicy:\n- If last_used_at is NULL and created_at > 90 days ago, mark as inactive and send email to user: 'Your API key has expired due to inactivity. Generate a new one.'\n- If last_used_at > 90 days ago, same.\n- Before revoking, send a warning email at day 60: 'Your API key will expire in 30 days if not used.'\n- For active keys used recently, do nothing.\n- Output: daily cron job script that performs revocations and sends emails. Return a completion matrix."},
  {id:688,category:"The Chef's Logic",title:"Cost-Effective Logging Recipe with Loki and S3",contract:"Input: expected log volume (GB/day). Output: setup for Grafana Loki with S3 storage under $10/mo.",matrix:["Deploy Loki in single binary mode","Configure S3 as chunk storage","Set retention to 7 days"],content:"You are a Logging Cost Chef. For a solo SaaS with 5GB logs/day, design a cheap logging system using Grafana Loki and S3.\n\nComponents:\n1. Loki (single binary) on a small VPS (2GB RAM).\n2. Configure `store` to use S3 (or S3-compatible like Backblaze B2) with `chunk_target_size` to skip indexing.\n3. Retention: 7 days in S3, then lifecycle policy to delete.\n4. Promtail to scrape logs from app containers.\n5. Estimated cost: VPS $5/mo, S3 storage 5GB*7=35GB ~ $0.70, requests $0.10.\nTotal < $6/mo.\nOutput: docker-compose.yml and configuration snippets. Return a completion matrix."},
  {id:689,category:"Growth Marketing",title:"Churn Magic Link Recovery Campaign",contract:"Input: user who cancelled but has high previous usage. Output: personalized email with magic link to reactive account.",matrix:["Select high-value cancelled users","Generate one-click reactivation link","Link bypasses payment for 1 month"],content:"You are a Churn Recovery Campaign Builder. For customers who cancelled but were power users, send a magic link to return without friction.\n\nCriteria: user had >50 actions per month and cancelled within last 14 days.\n\nMagic link: `https://app.com/reactivate?token={signed_jwt}` that sets subscription.active = true and adds 30 days free.\n\nEmail: Subject 'We want you back – no charge for 30 days'.\nBody: 'Your personalized reactivation link. Simply click and you're back in. No payment required for a month. If you don't want it, ignore.'\nInclude testimonial of similar customer who returned.\nTrack link clicks; for those who don't click in 7 days, send follow-up survey.\nOutput: Email template and token generation logic. Return a completion matrix."},
  {id:690,category:"Vibe Coding",title:"Real-Time Status Page Builder",contract:"Input: services to monitor (API, DB, website). Output: static HTML/JS status page with uptime checks.",matrix:["Write JavaScript that pings endpoints","Display green/red indicators","Show last check time"],content:"You are a Status Page Coder. Build a self-contained HTML page that periodically checks your services and shows their status.\n\nServices: \n- API: https://api.example.com/health\n- Database: (simulate via API)\n- Website: https://example.com\n\nImplementation:\n- Use fetch() with timeout 5 seconds. If response 2xx -> operational, else degraded.\n- Run checks every 60 seconds. Display green checkmark or red x.\n- Also show uptime percentage if you store history in localStorage (roll over 24h).\n- Provide a manual refresh button.\n- Style minimal, responsive.\nOutput: Single HTML file with embedded CSS/JS. Return a completion matrix."},
  {id:691,category:"Revenue Automation",title:"Discount Code Expiry Reminder",contract:"Input: discount codes expiring in 7 days. Output: email to customers who haven't used them.",matrix:["List codes ending in 7 days with unused flag","Send reminder email with code and urgency","Mark reminded in database"],content:"You are a Discount Expiry Reminder. For promo codes that are about to expire, send a reminder to users who have not yet redeemed them.\n\nDiscount data: code, user_email, expiry_date, amount.\n\nProcess:\n1. Every day at 9am, query codes where expiry_date between today+1 and today+7, and reminder_sent=false.\n2. For each, send email: Subject 'Your [XX]% discount expires in [N] days', Body include code again, and a link to apply at checkout.\n3. Mark reminder_sent = true to avoid duplicates.\n4. Also for codes expiring tomorrow, send a final urgency email.\n5. Log sends.\nOutput: SQL query and email template. Return a completion matrix."},
  {id:692,category:"Lead Generation",title:"GitHub Profile Fetcher for Targeted Repos",contract:"Input: GitHub search query (e.g., 'star:>100 language:python'). Output: list of users with email and company.",matrix:["Use GitHub API to search repos","Extract repo owner's profile","Get public email if available"],content:"You are a GitHub Lead Fetcher. Given a search query for repositories, return a list of potential leads (developers or companies) with contact info.\n\nQuery: [QUERY]\n\nSteps:\n1. Call GitHub API `GET /search/repositories?q=...`.\n2. For each repo, get owner login. Then `GET /users/{owner}` to fetch email (only if public), company, blog, location.\n3. Filter out users without public email.\n4. Score leads: if company name matches your target industry, add tag.\n5. Output CSV: username, email, company, repo_name, stars.\nNote: Respect API rate limits, use authentication.\nReturn a completion matrix."},
  {id:693,category:"Customer Support",title:"Sentiment-Based Escalation Router",contract:"Input: support ticket text. Output: route to human if negative sentiment > -0.7, else auto-reply.",matrix:["Compute sentiment score (-1 to +1)","If score < -0.7, flag for manager","Else, send canned response"],content:"You are a Sentiment Router. Analyze incoming support tickets; escalate negative ones to a human agent, others can be auto-replied.\n\nTicket: [TEXT]\n\nSentiment analysis via simple lexicon: count positive words ('great', 'thanks') and negative ('angry', 'terrible', 'broken'). Score = (pos - neg) / total_words.\n\nThresholds:\n- Score < -0.4: Escalate (send to priority queue).\n- Score between -0.4 and 0.3: Send standard template, but CC a human.\n- Score > 0.3: Auto-reply with thank you.\nAlso escalate if ticket contains 'urgent' or 'ASAP' regardless of sentiment.\nOutput: decision (HUMAN / AUTO) and the template ID if auto. Return a completion matrix."},
  {id:694,category:"Sales Funnel",title:"Free User to Paid Conversion Nudge",contract:"Input: free user activity (e.g., reached 80% of free tier limit). Output: modal popup with upgrade offer.",matrix:["Trigger when usage threshold hit","Show upgrade modal with feature comparison","Add limited-time discount badge"],content:"You are a Conversion Nudge Engine. When a free user hits a usage limit (e.g., 80% of API calls, or 10 projects), inject an upgrade modal.\n\nUser's free tier limit: 100 requests/day. Current: 80 requests.\n\nModal content:\n- Title: 'You're almost out of free requests!'.\n- Body: 'Upgrade to Pro for unlimited requests, plus analytics and priority support.'\n- Benefit: Highlight next tier's feature.\n- Offer: 'Today only: 20% off first month with code UPGRADE20'.\n- Two buttons: 'Upgrade now' (link to pricing) and 'Remind me later' (dismiss for 3 days).\nImplementation: JavaScript that fires based on usage data from API endpoint.\nOutput: HTML/JS modal code. Return a completion matrix."},
  {id:695,category:"Pricing Strategy",title:"Feature Usage Heatmap for Pricing Tiers",contract:"Input: user feature usage by tier. Output: heatmap showing which features are under/overused per tier.",matrix:["Aggregate feature usage per tier (free, pro)","Compute usage frequency (% users touching feature)","Flag features with >80% usage in lower tier (candidate for moving to higher tier)"],content:"You are a Feature Usage Heatmapper. Given analytics data of which features free vs paid users use, suggest repricing.\n\nData: feature_name, user_tier, count_users_using.\n\nSteps:\n1. For each feature, compute % of free users who use it, and % of pro users.\n2. If a feature is used by >70% of free users and <20% of pro users, it might be too valuable for free – consider moving to paid.\n3. If a feature is used by <5% of pro users and costs development, consider deprecating.\n4. Also identify features that are heavily used only by pro: they justify the price.\n5. Output a table with recommendations: 'move to pro', 'keep', 'remove'.\nReturn a completion matrix."},
  {id:696,category:"Churn Reduction",title:"Unsubscribe Feedback Collector and Analyzer",contract:"Input: unsubscribe reason from email campaign. Output: aggregated report and action to fix issues.",matrix:["Group reasons by category (too many, irrelevant)","Compute unsubscribe rate per campaign","Suggest frequency reduction if >2%"],content:"You are an Unsubscribe Analyzer. Collect feedback from users who unsubscribe from marketing emails and identify patterns.\n\nEach unsubscribe: campaign_id, reason (from a list or free text), timestamp.\n\nCategories:\n- 'Too many emails'\n- 'Content not relevant'\n- 'Never signed up'\n\nAnalysis:\n1. For each campaign, compute unsubscribe rate = unsubscribes / delivered.\n2. Flag campaigns with rate > 2%.\n3. If 'Too many emails' is top reason, recommend reducing frequency from weekly to bi-weekly.\n4. If 'Content not relevant', suggest segmenting users by interest (topic tags).\n5. Output weekly report and actions. Return a completion matrix."},
  {id:697,category:"Onboarding Automation",title:"Tutorial Completion Reward Distributor",contract:"Input: user finished interactive tutorial. Output: grant badge or discount code automatically.",matrix:["Wait for 'tutorial_complete' event","Check if user has not received reward before","Grant 10% discount and send congratulatory email"],content:"You are a Tutorial Reward Distributor. When a user completes the onboarding tutorial, automatically reward them to reinforce behavior.\n\nEvent: user_id, timestamp, tutorial_progress=100.\n\nReward logic:\n- If first-ever tutorial complete, grant discount code `WELCOME10` for 10% off first month.\n- Also add a 'Tutorial Champion' badge in UI.\n- Send email: 'Congrats on mastering the basics! Here's 10% off your first month.' with code.\n- Log reward issuance in database to prevent duplicate.\n- Optionally, for existing paid users, reward with 50 API call credits.\nOutput: code snippet for event handler. Return a completion matrix."},
  {id:698,category:"Email Marketing",title:"RSS-to-Email Newsletter Builder",contract:"Input: RSS feed URL (your blog). Output: automated weekly email digest with new posts.",matrix:["Fetch RSS feed items from last 7 days","Generate HTML summary (title + excerpt)","Send via email service (SendGrid)"],content:"You are an RSS-to-Email Automator. Turn your blog's RSS feed into a weekly newsletter to drive engagement.\n\nRSS URL: [URL]\nSend day: Every Monday 9am\n\nImplementation:\n1. On schedule, parse RSS feed (use `rss-parser`).\n2. Filter items with pubDate within last 7 days.\n3. For each item, extract title, link, description (first 100 chars).\n4. Build HTML email: header 'Weekly Digest: [Date]', list of posts with read more links, and a CTA to visit blog.\n5. Send to all subscribed users via SendGrid API (or AWS SES).\n6. Track open rates.\nOutput: Node.js script or Python script that can be run as a cron job. Return a completion matrix."},
  {id:699,category:"Payment Processing",title:"Payment Method Update Reminder for Failed Invoices",contract:"Input: invoice payment failed due to card. Output: payment link email with a smart retry link.",matrix:["Generate Stripe Payment Link for customer","Send email with 'Update payment method' button","If still unpaid after 3 days, send SMS"],content:"You are a Payment Update Reminder. When a customer's invoice fails, send them a link to update their payment method without logging in.\n\nInvoice ID: [INVOICE_ID]\nCustomer email: [EMAIL]\n\nProcess:\n1. Create a Stripe payment link (or customer portal) for updating card.\n2. Email subject: 'Action required: Update payment method'.\n3. Body: 'Your recent payment for [amount] failed. Please update your card to continue service.'\n4. Add a button: 'Update payment method' (link to portal).\n5. If no update after 3 days, send a second email and an SMS (if phone available).\n6. After 7 days, dunning suspend.\nOutput: Email template and links generation logic. Return a completion matrix."},
  {id:700,category:"User Analytics",title:"Session Replay Link Generator for Debugging",contract:"Input: user session ID and timestamp of issue. Output: link to replay session in your analytics tool (e.g., PostHog).",matrix:["Retrieve session recording URL","Wrap with authentication token","Log access for security review"],content:"You are a Session Replay Link Generator. When a user reports a bug, generate a direct link to watch their session replay.\n\nSession ID: [SESSION_ID]\nTool: PostHog / LogRocket (API key available)\n\nSteps:\n1. Query the session recording API to fetch the shareable URL (if supported).\n2. If not, generate a signed URL with expiration (24 hours) that links to the session in your internal dashboard.\n3. Provide a markdown link: `[View replay](URL)`.\n4. Also include relevant metadata: user email, timestamp, page URL.\n5. Output: The link and a short instruction to paste into bug tracking tool.\nReturn a completion matrix."}

  {id:701,category:"Floyd Skills",title:"Adaptive Behavior",contract:"Input: action. Output: structured result with analysis and recommendations. Enable agents to adapt behavior based on environment, feedback, and learning.",matrix:["Validate and process action","Execute core logic with error handling","Return structured result with verification"],content:"You are a Adaptive Behavior engine. Enable agents to adapt behavior based on environment, feedback, and learning.\n\nInputs:\n  [ACTION (required)]: action parameter\n  [FEEDBACK (optional)]: feedback parameter\n  [ADAPTATION_RATE (optional)]: adaptation_rate parameter\n  [CURRENT_BEHAVIOR (optional)]: current_behavior parameter\n  [ENVIRONMENT_STATE (optional)]: environment_state parameter\n\nExecution Steps:\n1. VALIDATE — Verify all required inputs are present and correctly typed. Reject early with a structured error on mismatch.\n2. PROCESS — Execute the core logic deterministically. No randomness. No undefined behavior.\n3. COMPOSE — Structure the result with analysis, recommendations, and confidence metrics.\n4. VERIFY — Check output completeness against the schema. Ensure no required fields are missing.\n5. RETURN — Deliver the structured result.\n\nGuardrails:\n- Do not ask follow-up questions unless a required input is missing.\n- State assumptions explicitly.\n- Prefer a practical working artifact over theoretical perfection.\n- If any computation is ambiguous, document the ambiguity in the output.\n- Return a completion matrix marking each output field Done, Blocked, or Needs Input."},
  {id:702,category:"Floyd Skills",title:"Adaptive Strategy",contract:"Input: action. Output: structured result with analysis and recommendations. Develop strategies that adapt to changing conditions with trigger-based pivots.",matrix:["Validate and process action","Execute core logic with error handling","Return structured result with verification"],content:"You are a Adaptive Strategy engine. Develop strategies that adapt to changing conditions with trigger-based pivots.\n\nInputs:\n  [ACTION (required)]: action parameter\n  [BASE_STRATEGY (optional)]: base_strategy parameter\n  [PIVOT_OPTIONS (optional)]: pivot_options parameter\n  [ENVIRONMENT_STATE (optional)]: environment_state parameter\n  [ADAPTATION_TRIGGERS (optional)]: adaptation_triggers parameter\n\nExecution Steps:\n1. VALIDATE — Verify all required inputs are present and correctly typed. Reject early with a structured error on mismatch.\n2. PROCESS — Execute the core logic deterministically. No randomness. No undefined behavior.\n3. COMPOSE — Structure the result with analysis, recommendations, and confidence metrics.\n4. VERIFY — Check output completeness against the schema. Ensure no required fields are missing.\n5. RETURN — Deliver the structured result.\n\nGuardrails:\n- Do not ask follow-up questions unless a required input is missing.\n- State assumptions explicitly.\n- Prefer a practical working artifact over theoretical perfection.\n- If any computation is ambiguous, document the ambiguity in the output.\n- Return a completion matrix marking each output field Done, Blocked, or Needs Input."},
  {id:703,category:"Floyd Skills",title:"Agent Communication",contract:"Input: action. Output: structured result with analysis and recommendations. Facilitate structured communication between agents with message routing and protocol handling.",matrix:["Validate and process action","Execute core logic with error handling","Return structured result with verification"],content:"You are a Agent Communication engine. Facilitate structured communication between agents with message routing and protocol handling.\n\nInputs:\n  [ACTION (required)]: action parameter\n  [CHANNEL (optional)]: channel parameter\n  [MESSAGE (optional)]: message parameter\n  [PROTOCOL (optional)]: protocol parameter\n  [TARGET_AGENTS (optional)]: target_agents parameter\n\nExecution Steps:\n1. VALIDATE — Verify all required inputs are present and correctly typed. Reject early with a structured error on mismatch.\n2. PROCESS — Execute the core logic deterministically. No randomness. No undefined behavior.\n3. COMPOSE — Structure the result with analysis, recommendations, and confidence metrics.\n4. VERIFY — Check output completeness against the schema. Ensure no required fields are missing.\n5. RETURN — Deliver the structured result.\n\nGuardrails:\n- Do not ask follow-up questions unless a required input is missing.\n- State assumptions explicitly.\n- Prefer a practical working artifact over theoretical perfection.\n- If any computation is ambiguous, document the ambiguity in the output.\n- Return a completion matrix marking each output field Done, Blocked, or Needs Input."},
  {id:704,category:"Floyd Skills",title:"Analogy Synthesis",contract:"Input: source_concept. Output: success, analysis, audience, metadata. Generate meaningful analogies to explain complex concepts, solve problems through similarity reasoning, and bridge understanding between different domains through structural mapping. Provides confidence-scored analogies with clear limitations and audience-appropriate explanations.",matrix:["Validate and process source concept","Compute success and analysis","Return structured output with success analysis audience"],content:"You are a Analogy Synthesis engine. Generate meaningful analogies to explain complex concepts, solve problems through similarity reasoning, and bridge understanding between different domains through structural mapping. Provides confidence-scored analogies with clear limitations and audience-appropriate explanations.\n\nInputs:\n  [SOURCE_CONCEPT (required)]: \n  [TARGET_AUDIENCE (optional)]: \n  [GENERATION_OPTIONS (optional)]: \n\nExecution Steps:\n1. VALIDATE — Verify all required inputs are present and correctly typed. Reject early with a structured error on mismatch.\n2. PROCESS — Execute the core logic deterministically. No randomness. No undefined behavior.\n3. COMPOSE — Build the output object with: success, analysis, audience, metadata, target_concept, usage_guidelines.\n4. VERIFY — Check output completeness against the schema. Ensure no required fields are missing.\n5. RETURN — Deliver the structured result.\n\nOutput Specification:\n  success: \n  analysis: \n  audience: \n  metadata: \n  target_concept: \n  usage_guidelines: \n  generated_analogies: \n  confidence_breakdown: \n\nGuardrails:\n- Do not ask follow-up questions unless a required input is missing.\n- State assumptions explicitly.\n- Prefer a practical working artifact over theoretical perfection.\n- If any computation is ambiguous, document the ambiguity in the output.\n- Return a completion matrix marking each output field Done, Blocked, or Needs Input."},

// ── State Management ───────────────────────────────────────────
function safeGetLS(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (raw === null) return fallback;
    const parsed = JSON.parse(raw);
    return parsed;
  } catch {
    return fallback;
  }
}

function safeSetLS(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch {
    // localStorage unavailable or full — graceful degradation
  }
}

function loadUsage() { return safeGetLS(LS_USAGE, {}); }
function loadFavs() { return safeGetLS(LS_FAVS, []); }
function saveUsage(u) { safeSetLS(LS_USAGE, u); }
function saveFavs(f) { safeSetLS(LS_FAVS, f); }

let activeCategory = safeGetLS(LS_CATEGORY, 'All');
let searchQuery = safeGetLS(LS_SEARCH, '');
let usageCounts = loadUsage();
let favorites = loadFavs();

// ── Toast System ───────────────────────────────────────────────
function showToast(message, type = 'success') {
  const colors = {
    success: 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400',
    info: 'bg-cyan-500/10 border-cyan-500/30 text-cyan-400',
    warn: 'bg-amber-500/10 border-amber-500/30 text-amber-400'
  };
  const toast = document.createElement('div');
  toast.className = `toast-enter mono text-xs px-4 py-2.5 rounded-xl border backdrop-blur-md ${colors[type] || colors.success}`;
  toast.textContent = message;
  $toastContainer.appendChild(toast);
  setTimeout(() => {
    toast.classList.remove('toast-enter');
    toast.classList.add('toast-exit');
    setTimeout(() => toast.remove(), 250);
  }, 2000);
}

// ── Metrics Dashboard ──────────────────────────────────────────
function updateMetrics() {
  const totalPrompts = PROMPTS.length;
  const totalCopies = Object.values(usageCounts).reduce((a, b) => a + b, 0);
  const favCount = favorites.length;

  // Most used category
  const catUsage = {};
  PROMPTS.forEach(p => {
    const u = usageCounts[p.id] || 0;
    if (u > 0) catUsage[p.category] = (catUsage[p.category] || 0) + u;
  });
  let mostUsedCat = 'None yet';
  let maxU = 0;
  for (const [cat, count] of Object.entries(catUsage)) {
    if (count > maxU) { mostUsedCat = cat; maxU = count; }
  }
  if (maxU === 0) mostUsedCat = 'None yet';

  const activeFilter = activeCategory === 'All' ? 'All Active' : activeCategory;

  const metrics = [
    { label: 'Total Payloads', value: totalPrompts, icon: 'M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4', color: 'cyan' },
    { label: 'Total Copies', value: totalCopies, icon: 'M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3', color: 'violet' },
    { label: 'Favorites', value: favCount, icon: 'M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z', color: 'pink' },
    { label: 'Top Category', value: mostUsedCat, icon: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z', color: 'amber' },
    { label: 'Active Filter', value: activeFilter, icon: 'M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z', color: 'emerald' }
  ];

  const colorMap = {
    cyan: { bg: 'bg-cyan-400/5', border: 'border-cyan-400/15', text: 'text-cyan-400', valueText: 'text-cyan-300' },
    violet: { bg: 'bg-violet-400/5', border: 'border-violet-400/15', text: 'text-violet-400', valueText: 'text-violet-300' },
    pink: { bg: 'bg-pink-400/5', border: 'border-pink-400/15', text: 'text-pink-400', valueText: 'text-pink-300' },
    amber: { bg: 'bg-amber-400/5', border: 'border-amber-400/15', text: 'text-amber-400', valueText: 'text-amber-300' },
    emerald: { bg: 'bg-emerald-400/5', border: 'border-emerald-400/15', text: 'text-emerald-400', valueText: 'text-emerald-300' }
  };

  const prevValues = {};
  $metrics.querySelectorAll('.counter-value').forEach(el => {
    prevValues[el.dataset.metric] = el.textContent;
  });

  $metrics.innerHTML = metrics.map(m => {
    const c = colorMap[m.color];
    return `<div class="metric-card glass-panel rounded-xl p-4 ${c.bg} border ${c.border}">
      <div class="flex items-center gap-2 mb-1.5">
        <svg class="w-3.5 h-3.5 ${c.text}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${m.icon}"/></svg>

      </div>
      <div class="counter-value text-lg font-bold ${c.valueText} truncate" data-metric="${m.label}">${m.value}</div>

  }).join('');

  // Bump animation on changed values
  $metrics.querySelectorAll('.counter-value').forEach(el => {

      el.classList.add('bumped');
      el.addEventListener('animationend', () => el.classList.remove('bumped'), { once: true });
    }
  });

// ── Category Filters ───────────────────────────────────────────
function renderFilters() {
  $categoryFilters.innerHTML = CATEGORIES.map(cat => {
    const isActive = cat === activeCategory;
    const isAll = cat === 'All';
    const activeClasses = isActive
      ? 'bg-cyan-400/15 border-cyan-400/40 text-cyan-300 shadow-[0_0_12px_rgba(34,211,238,0.1)]'
      : 'bg-zinc-900/60 border-zinc-800 text-zinc-400 hover:text-zinc-300 hover:border-zinc-700';
    return `<button
      role="tab"
      aria-selected="${isActive}"
      data-category="${cat}"
      class="category-pill focus-visible mono text-xs px-3.5 py-1.5 rounded-lg border transition-all ${activeClasses}"
    >${cat}</button>`;
  }).join('');
}

// ── Search & Filter Logic ──────────────────────────────────────
let searchTimeout = null;

function getFilteredPrompts() {
  let filtered = PROMPTS;

  if (activeCategory !== 'All') {
    filtered = filtered.filter(p => p.category === activeCategory);
  }

  if (searchQuery.trim()) {
    const q = searchQuery.toLowerCase().trim();
    filtered = filtered.filter(p =>
      p.title.toLowerCase().includes(q) ||
      p.category.toLowerCase().includes(q) ||
      p.contract.toLowerCase().includes(q) ||
      p.matrix.some(m => m.toLowerCase().includes(q)) ||
      p.content.toLowerCase().includes(q)
    );
  }

  return filtered;
}

            <svg class="w-3 h-3 text-zinc-700 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span class="truncate">${m}</span>
          </div>`).join('')}
        </div>
      </div>

      <div class="card-footer mt-auto flex items-center justify-between pt-3 border-t border-zinc-800/50">
        <div class="flex items-center gap-1 text-[10px] mono text-zinc-600">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"/></svg>
          <span>${usage} ${usage === 1 ? 'copy' : 'copies'}</span>
        </div>
        <div class="card-actions flex items-center gap-1.5">
          <button
            class="detail-btn focus-visible mono text-[10px] px-2.5 py-1.5 rounded-lg bg-zinc-800/80 border border-zinc-700/50 text-zinc-400 hover:text-zinc-200 hover:border-zinc-600 transition-all"
            data-detail-id="${p.id}"
          >Details</button>
          <button
            class="copy-btn focus-visible btn-glow mono text-[10px] px-2.5 py-1.5 rounded-lg bg-cyan-400/10 border border-cyan-400/25 text-cyan-400 hover:bg-cyan-400/15 transition-all"
            data-copy-id="${p.id}"
          >Copy Payload</button>
        </div>
      </div>
    </article>`;
  }).join('');
}

// ── Copy Payload ───────────────────────────────────────────────
function formatPayload(p) {
  return `# ${p.title}\n\nCategory: ${p.category}\n\nContract:\n${p.contract}\n\nExecution Matrix:\n${p.matrix.map(m => `- ${m}`).join('\n')}\n\nPrompt:\n${p.content}`;
}

async function copyPayload(id, sourceBtn) {
  const prompt = PROMPTS.find(p => p.id === id);
  if (!prompt) return;

  const text = formatPayload(prompt);

  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch {}
    document.body.removeChild(ta);
  }

  // Success flash on the button that triggered the copy
  if (sourceBtn) {
    const origText = sourceBtn.textContent;
    sourceBtn.classList.add('copy-success');
    sourceBtn.textContent = 'Copied ✓';
    setTimeout(() => {
      sourceBtn.classList.remove('copy-success');
      sourceBtn.textContent = origText;
    }, 700);
  }

  usageCounts[id] = (usageCounts[id] || 0) + 1;
  saveUsage(usageCounts);
  updateMetrics();
  renderPrompts();
  showToast(`Payload copied: ${prompt.title}`);
}

// ── Toggle Favorite ────────────────────────────────────────────
function toggleFavorite(id) {
  const favBtn = document.querySelector(`[data-fav-id="${id}"]`);
  const idx = favorites.indexOf(id);
  const isAdding = idx === -1;
  if (isAdding) {
    favorites.push(id);
    showToast('Added to favorites', 'info');
  } else {
    favorites.splice(idx, 1);
    showToast('Removed from favorites', 'info');
  }
  saveFavs(favorites);
  updateMetrics();

  // Animate heart before re-render
  if (favBtn) {
    favBtn.classList.add(isAdding ? 'fav-adding' : 'fav-removing');
    favBtn.addEventListener('animationend', () => {
      renderPrompts();
    }, { once: true });
  } else {
    renderPrompts();
  }
}

// ── Modal ──────────────────────────────────────────────────────
function openModal(id) {
  const p = PROMPTS.find(pr => pr.id === id);
  if (!p) return;

  const colors = CATEGORY_COLORS[p.category];
  const usage = usageCounts[p.id] || 0;

  $modalContent.innerHTML = `
    <div class="flex items-center justify-between mb-6">
      <span class="mono text-[10px] px-2 py-0.5 rounded-md ${colors.bg} ${colors.text} border ${colors.border}">${p.category}</span>
      <button id="modalClose" class="focus-visible p-1.5 rounded-lg hover:bg-zinc-800 text-zinc-500 hover:text-zinc-300 transition-colors" aria-label="Close modal">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <h2 class="text-xl font-bold text-zinc-100 mb-4">${p.title}</h2>

    <div class="space-y-5">
      <div>
        <h3 class="mono text-[10px] uppercase tracking-wider text-zinc-500 mb-2">Contract</h3>
        <p class="text-sm text-zinc-300 leading-relaxed">${p.contract}</p>
      </div>

      <div>
        <h3 class="mono text-[10px] uppercase tracking-wider text-zinc-500 mb-2">Execution Matrix</h3>
        <ul class="space-y-2">
          ${p.matrix.map(m => `<li class="flex items-start gap-2 text-sm text-zinc-300">
            <svg class="w-4 h-4 text-cyan-400/60 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            ${m}
          </li>`).join('')}
        </ul>
      </div>

      <div>
        <h3 class="mono text-[10px] uppercase tracking-wider text-zinc-500 mb-2">Prompt Payload</h3>
        <pre class="text-xs text-zinc-300 leading-relaxed whitespace-pre-wrap bg-zinc-950/50 rounded-xl p-4 border border-zinc-800/50 max-h-64 overflow-y-auto">${p.content.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre>
      </div>
    </div>

    <div class="flex items-center justify-between mt-6 pt-4 border-t border-zinc-800/50">
      <span class="mono text-[10px] text-zinc-600">${usage} ${usage === 1 ? 'copy' : 'copies'}</span>
      <button
        id="modalCopyBtn"
        class="focus-visible btn-glow mono text-xs px-4 py-2 rounded-xl bg-cyan-400/10 border border-cyan-400/25 text-cyan-400 hover:bg-cyan-400/15 transition-all"
        data-copy-id="${p.id}"
      >Copy Payload</button>
    </div>
  `;

  $modalOverlay.classList.remove('hidden');
  document.body.style.overflow = 'hidden';

  // Focus management
  const closeBtn = document.getElementById('modalClose');
  if (closeBtn) closeBtn.focus();

  // Wire modal close
  closeBtn.addEventListener('click', closeModal);
  document.getElementById('modalCopyBtn').addEventListener('click', function() {
    copyPayload(p.id, this);
  });
}

function closeModal() {
  // Smooth exit animation
  $modalContent.classList.add('modal-closing');
  const overlay = $modalOverlay.querySelector('.modal-overlay');
  if (overlay) overlay.style.transition = 'opacity 0.2s ease';
  if (overlay) overlay.style.opacity = '0';

  setTimeout(() => {
    $modalOverlay.classList.add('hidden');
    $modalContent.classList.remove('modal-closing');
    if (overlay) overlay.style.opacity = '';
    if (overlay) overlay.style.transition = '';
    document.body.style.overflow = '';
  }, 200);
}

// ── Export ─────────────────────────────────────────────────────
function exportJSON() {
  const data = {
    exported: new Date().toISOString(),
    prompts: PROMPTS,
    usageCounts,
    favorites
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `legacy-mission-control-export-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Export complete', 'info');
}

// ── Reset ──────────────────────────────────────────────────────
function resetAll() {
  if (!confirm('Reset all usage counts, favorites, and filters? This cannot be undone.')) return;
  usageCounts = {};
  favorites = [];
  activeCategory = 'All';
  searchQuery = '';
  saveUsage(usageCounts);
  saveFavs(favorites);
  safeSetLS(LS_CATEGORY, 'All');
  safeSetLS(LS_SEARCH, '');
  $searchInput.value = '';
  updateMetrics();
  renderFilters();
  renderPrompts();
  showToast('All data reset', 'warn');
}

// ── Event Delegation ───────────────────────────────────────────
$promptGrid.addEventListener('click', (e) => {
  const copyBtn = e.target.closest('[data-copy-id]');
  if (copyBtn) {
    copyPayload(parseInt(copyBtn.dataset.copyId), copyBtn);
    return;
  }
  const detailBtn = e.target.closest('[data-detail-id]');
  if (detailBtn) {
    openModal(parseInt(detailBtn.dataset.detailId));
    return;
  }
  const favBtn = e.target.closest('[data-fav-id]');
  if (favBtn) {
    toggleFavorite(parseInt(favBtn.dataset.favId));
    return;
  }
});

$categoryFilters.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-category]');
  if (!btn) return;
  activeCategory = btn.dataset.category;
  safeSetLS(LS_CATEGORY, activeCategory);
  // Clear favorites mode when selecting a category
  delete $categoryFilters.dataset.favMode;
  renderFilters();
  updateMetrics();
  renderPrompts();
});

$searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    searchQuery = $searchInput.value;
    safeSetLS(LS_SEARCH, searchQuery);
    $clearSearch.classList.toggle('hidden', !searchQuery);
    renderPrompts();
  }, 200);
});

$clearSearch.addEventListener('click', () => {
  searchQuery = '';
  $searchInput.value = '';
  safeSetLS(LS_SEARCH, '');
  $clearSearch.classList.add('hidden');
  renderPrompts();
});

$modalBackdrop.addEventListener('click', closeModal);
$exportBtn.addEventListener('click', exportJSON);
$resetBtn.addEventListener('click', resetAll);

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// ── Mobile Interactions ─────────────────────────────────────────

// Header toggle (collapse/expand on mobile)
const $headerToggle = document.getElementById('headerToggle');
const $headerContent = document.getElementById('headerContent');
if ($headerToggle && $headerContent) {
  // Auto-collapse on mobile after 3 seconds
  const autoCollapse = () => {
    if (window.innerWidth < 640) {
      $headerContent.classList.add('collapsed');
      $headerToggle.querySelector('svg').style.transform = 'rotate(180deg)';
    }
  };
  setTimeout(autoCollapse, 3000);

  $headerToggle.addEventListener('click', () => {
    const isCollapsed = $headerContent.classList.toggle('collapsed');
    $headerToggle.querySelector('svg').style.transform = isCollapsed ? 'rotate(180deg)' : '';
  });
}

// Sticky bar scroll shadow
const $stickyBar = document.getElementById('stickyBar');
if ($stickyBar) {
  let scrollTicking = false;
  window.addEventListener('scroll', () => {
    if (!scrollTicking) {
      requestAnimationFrame(() => {
        $stickyBar.classList.toggle('scrolled', window.scrollY > 10);
        scrollTicking = false;
      });
      scrollTicking = true;
    }
  }, { passive: true });
}

// Bottom nav button handling
const $bottomNav = document.querySelector('.bottom-nav');
if ($bottomNav) {
  $bottomNav.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-nav]');
    if (!btn) return;

    // Update active state
    $bottomNav.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const action = btn.dataset.nav;
    switch (action) {
      case 'home':
        window.scrollTo({ top: 0, behavior: 'smooth' });
        break;
      case 'search':
        $searchInput.focus();
        $searchInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
        break;
      case 'favs': {
        // Toggle favorites-only view
        const showingFavs = $categoryFilters.dataset.favMode === 'true';
        if (showingFavs) {
          // Exit favorites mode — restore previous category
          delete $categoryFilters.dataset.favMode;
          renderFilters();
          renderPrompts();
          showToast('Showing all payloads', 'info');
        } else {
          // Enter favorites mode
          $categoryFilters.dataset.favMode = 'true';
          // Visually deactivate all category pills
          $categoryFilters.querySelectorAll('.category-pill').forEach(p => {
            p.classList.remove('bg-cyan-400/15', 'border-cyan-400/40', 'text-cyan-300', 'shadow-[0_0_12px_rgba(34,211,238,0.1)]');
            p.classList.add('bg-zinc-900/60', 'border-zinc-800', 'text-zinc-400');
            p.setAttribute('aria-selected', 'false');
          });
          renderFavFilteredPrompts();
          showToast(`Showing ${favorites.length} favorites`, 'info');
        }
        break;
      }
      case 'categories':
        $categoryFilters.scrollIntoView({ behavior: 'smooth', block: 'center' });
        break;
    }
  });
}

// Render only favorited prompts (for favs nav button)
function renderFavFilteredPrompts() {
  const favPrompts = PROMPTS.filter(p => favorites.includes(p.id));
  if (favPrompts.length === 0) {
    $promptGrid.innerHTML = '';
    $emptyState.classList.remove('hidden');
    return;
  }
  $emptyState.classList.add('hidden');
  // Reuse the card rendering by temporarily swapping filtered results
  const savedCat = activeCategory;
  const savedQuery = searchQuery;
  activeCategory = 'All';
  searchQuery = '';

  $promptGrid.innerHTML = favPrompts.map((p, i) => {
    const colors = CATEGORY_COLORS[p.category];
    const usage = usageCounts[p.id] || 0;
    const isFav = true; // all are favs in this view

    return `<article
      class="prompt-card card-enter card-hover glass-panel rounded-2xl p-5 flex flex-col"
      style="animation-delay: ${Math.min(i * 30, 300)}ms"
      role="listitem"
      data-id="${p.id}"
    >
      <div class="card-body flex flex-col flex-1">
        <div class="flex items-start justify-between mb-3">
          <span class="mono text-[10px] px-2 py-0.5 rounded-md ${colors.bg} ${colors.text} border ${colors.border}">${p.category}</span>
          <button
            class="fav-btn focus-visible p-1 rounded-lg hover:bg-zinc-800/50 transition-colors"
            data-fav-id="${p.id}"
            aria-label="Remove from favorites"
          >
            <svg class="w-4 h-4 text-pink-400 fill-pink-400" fill="currentColor" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
          </button>
        </div>
        <h3 class="text-sm font-semibold text-zinc-100 mb-2 leading-snug">${p.title}</h3>
        <p class="contract-text text-xs text-zinc-500 mb-3 line-clamp-2 leading-relaxed">${p.contract}</p>
        <div class="mb-3 space-y-1">
          ${p.matrix.map(m => `<div class="flex items-start gap-1.5 text-[10px] text-zinc-600">
            <svg class="w-3 h-3 text-zinc-700 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span class="truncate">${m}</span>
          </div>`).join('')}
        </div>
      </div>
      <div class="card-footer mt-auto flex items-center justify-between pt-3 border-t border-zinc-800/50">
        <div class="flex items-center gap-1 text-[10px] mono text-zinc-600">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"/></svg>
          <span>${usage} ${usage === 1 ? 'copy' : 'copies'}</span>
        </div>
        <div class="card-actions flex items-center gap-1.5">
          <button class="detail-btn focus-visible mono text-[10px] px-2.5 py-1.5 rounded-lg bg-zinc-800/80 border border-zinc-700/50 text-zinc-400 hover:text-zinc-200 hover:border-zinc-600 transition-all" data-detail-id="${p.id}">Details</button>
          <button class="copy-btn focus-visible btn-glow mono text-[10px] px-2.5 py-1.5 rounded-lg bg-cyan-400/10 border border-cyan-400/25 text-cyan-400 hover:bg-cyan-400/15 transition-all" data-copy-id="${p.id}">Copy Payload</button>
        </div>
      </div>
    </article>`;
  }).join('');

  // Restore saved state
  activeCategory = savedCat;
  searchQuery = savedQuery;
}

// ── Init ───────────────────────────────────────────────────────
$searchInput.value = searchQuery;
$clearSearch.classList.toggle('hidden', !searchQuery);
updateMetrics();
renderFilters();
renderPrompts();
</script>
</body>
